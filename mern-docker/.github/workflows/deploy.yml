name: CI/CD → MERN Docker

on:
  push:
    branches: [main]

jobs:

  # ── JOB 1: Test ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test backend
        run: |
          cd server-boilerplate
          npm install
          npm test

      - name: Test frontend
        run: |
          cd client-boilerplate
          npm install
          npm test

  # ── JOB 2: Deploy ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/sahajafashion

            # Pull latest code
            git reset --hard HEAD
            git pull origin main

            # Update MongoDB URL in docker-compose
            export DB_URL="${{ secrets.DB_URL }}"

            # Stop old containers
            docker compose down

            # Rebuild and start fresh
            docker compose up -d --build

            # Remove unused images to save disk space
            docker image prune -f