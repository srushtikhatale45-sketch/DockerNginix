services:
  web:
    depends_on:
      - api
    build: ./client-boilerplate
    ports:
      - "3000:80"
    restart: always

  api:
    build: ./server-boilerplate
    ports:
      - "8000:8000"
    env_file:
      - ./server-boilerplate/.env
    restart: always

  nginx:
    image: nginx:alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/sites-available/sahajafashion.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always